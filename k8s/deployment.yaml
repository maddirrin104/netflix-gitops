apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix
  template:
    metadata:
      labels:
        app: netflix
    spec:
      containers:
        - name: netflix
          image: maddirrin104/netflix-clone-react-typescript:9f350b39ed5a80a284103e58001742868a545ed2
          ports:
            - containerPort: 80