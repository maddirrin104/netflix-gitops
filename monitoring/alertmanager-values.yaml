global:
  resolve_timeout: 5m

route:
  receiver: telegram-notify
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m

receivers:
  - name: telegram-notify
    telegram_configs:
      - bot_token: 'TOKEN_BOT'
        chat_id: 'chat_id'
        parse_mode: HTML
        message: |
          🚨 <b>{{ .CommonLabels.alertname }}</b>
          Severity: {{ .CommonLabels.severity }}
          Summary: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}